<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>yas =^..^=</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐱</text></svg>">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <header>
    <h1 class="wordmark"><a href="./">yas</a> <span class="cat" aria-hidden="true">=^..^=</span></h1>
    <p class="tagline">a queryable record of everything you run · <a class="nav-link" href="digest.html">digest</a></p>
  </header>
  <main>
    <form id="search-form" role="search">
      <input id="search-box" type="search" autofocus autocomplete="off" spellcheck="false"
             placeholder="free text · host:pine · cwd:/dev · exit:127 · failed · executor:claude · after:2026-06-01"
             aria-label="search history">
    </form>
    <details id="view-options" class="view-options">
      <summary>view options</summary>
      <div class="view-options-body">
        <label><input type="checkbox" id="opt-collapse"> collapse duplicate runs</label>
        <label><input type="checkbox" id="opt-hide-failures"> hide failures</label>
        <label>executor
          <select id="opt-executor">
            <option value="">all</option>
            <option value="$all-human">human</option>
            <option value="$all-agent">agent</option>
          </select>
        </label>
        <label>host <input type="text" id="opt-host" size="10" autocomplete="off" spellcheck="false"></label>
      </div>
    </details>
    <p id="session-banner" class="session-banner"></p>
    <ol id="timeline"></ol>
    <p id="status" class="status" aria-live="polite"></p>
    <div id="sentinel" aria-hidden="true"></div>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
